name: Newsletter Pipeline Schedule

on:
  schedule:
    # Run every Tuesday at 09:00 KST (Tuesday 00:00 UTC)
    - cron: "0 0 * * 2"
  workflow_dispatch:
    inputs:
      countries:
        description: "Comma-separated country codes (e.g., KR,RU,VN)"
        required: false
        default: "KR,RU,VN,TH,PH,PK"
      dry_run:
        description: "Skip email sending"
        required: false
        type: boolean
        default: false

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
  GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
  GMAIL_SENDER: ${{ secrets.GMAIL_SENDER || 'skenbizst@gmail.com' }}
  DEFAULT_RECIPIENTS: ${{ secrets.DEFAULT_RECIPIENTS }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt langgraph langchain-core langchain-anthropic anthropic feedparser beautifulsoup4 lxml trafilatura deep-translator google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib google-genai pyyaml tenacity python-dateutil

      - name: Update Supabase runs to "in_progress"
        run: |
          curl -s -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/runs?status=eq.running" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"current_phase": "collection"}' || true

      - name: Run newsletter pipeline
        run: |
          PYTHONPATH=. python -u -c "
          import asyncio, os, json, sys, time

          # Force unbuffered output
          sys.stdout.reconfigure(line_buffering=True)

          from backend.agent.graph import compile_graph, create_initial_state

          countries = os.environ.get('INPUT_COUNTRIES', 'KR').split(',')
          countries = [c.strip() for c in countries]
          print(f'=== Starting pipeline for {countries} ===', flush=True)

          async def main():
              graph = compile_graph()
              state = create_initial_state(countries=countries)
              config = {'configurable': {'thread_id': 'github-action'}}
              final = {}

              async for event in graph.astream(state, config=config):
                  for node_name, output in event.items():
                      phase = output.get('current_phase', '')
                      final.update(output)

                      # Detailed logging per phase
                      stats = ''
                      if 'raw_articles' in output:
                          stats = ' | '.join(f'{c}:{len(a)}' for c,a in output['raw_articles'].items())
                          stats = f' articles=[{stats}]'
                      if 'scored_articles' in output:
                          stats = ' | '.join(f'{c}:{len(a)}' for c,a in output['scored_articles'].items())
                          stats = f' scored=[{stats}]'
                      if 'newsletters' in output:
                          stats = ' | '.join(f'{c}:{len(h)}chars' for c,h in output['newsletters'].items())
                          stats = f' html=[{stats}]'

                      print(f'[{node_name}] Phase: {phase}{stats}', flush=True)

              # Save newsletters
              newsletters = final.get('newsletters', {})
              os.makedirs('output/newsletters', exist_ok=True)
              for country, html in newsletters.items():
                  with open(f'output/newsletters/newsletter_{country}.html', 'w') as f:
                      f.write(html)
                  print(f'Saved newsletter_{country}.html ({len(html)} chars)', flush=True)

              print(f'=== Pipeline completed! {len(newsletters)} newsletters ===', flush=True)

          asyncio.run(main())
          "
        env:
          INPUT_COUNTRIES: ${{ github.event.inputs.countries || 'KR' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Update Supabase runs to "completed"
        if: success()
        run: |
          curl -s -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/runs?status=eq.running" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "completed", "current_phase": "complete"}' || true
          echo "Supabase runs updated to completed"

      - name: Update Supabase runs to "failed" on error
        if: failure()
        run: |
          curl -s -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/runs?status=eq.running" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "failed", "current_phase": "error"}' || true

      - name: Upload newsletters
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-output-${{ github.run_number }}
          path: |
            output/newsletters/
          retention-days: 30
