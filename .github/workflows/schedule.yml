name: Newsletter Pipeline Schedule

on:
  schedule:
    # Run every Tuesday at 08:00 KST (Monday 23:00 UTC)
    - cron: "0 23 * * 1"
  workflow_dispatch:
    inputs:
      countries:
        description: "Comma-separated country codes (e.g., KR,RU,VN)"
        required: false
        default: "KR,RU,VN,TH,PH,PK"
      dry_run:
        description: "Skip email sending"
        required: false
        type: boolean
        default: false

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run newsletter pipeline
        run: |
          python -c "
          import asyncio
          import os
          from backend.agent.graph import compile_graph, create_initial_state

          countries = os.environ.get('INPUT_COUNTRIES', 'KR,RU,VN,TH,PH,PK').split(',')
          countries = [c.strip() for c in countries]

          async def main():
              graph = compile_graph()
              state = create_initial_state(countries=countries)
              config = {'configurable': {'thread_id': 'github-action'}}

              async for event in graph.astream(state, config=config):
                  for node_name, output in event.items():
                      phase = output.get('current_phase', '')
                      print(f'Phase: {phase} | Node: {node_name}')

              print('Pipeline completed!')

          asyncio.run(main())
          "
        env:
          INPUT_COUNTRIES: ${{ github.event.inputs.countries || 'KR,RU,VN,TH,PH,PK' }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-output-${{ github.run_number }}
          path: |
            output/newsletters/
            output/logs/
          retention-days: 30
