name: Newsletter Pipeline Schedule

on:
  schedule:
    # Run every Wednesday at 07:00 KST
    - cron: "0 22 * * 2"
  workflow_dispatch:
    inputs:
      countries:
        description: "Comma-separated country codes (e.g., KR,RU,VN)"
        required: false
        default: ""
      dry_run:
        description: "Skip email sending"
        required: false
        type: boolean
        default: false
      force_run:
        description: "Force run regardless of time (for manual triggers)"
        required: false
        type: boolean
        default: false
      run_id:
        description: "Run ID from backend (links GitHub Actions to DB row)"
        required: false
        default: ""

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
  GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
  GMAIL_SENDER: ${{ secrets.GMAIL_SENDER || 'skenbizst@gmail.com' }}
  DEFAULT_RECIPIENTS: ${{ secrets.DEFAULT_RECIPIENTS }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Check allowed time window
        run: |
          EVENT="${{ github.event_name }}"
          FORCE="${{ github.event.inputs.force_run }}"

          # schedule 트리거는 크론 자체가 정확한 시간이므로 항상 통과
          if [ "$EVENT" = "schedule" ]; then
            echo "✅ schedule event — skipping time check."
            exit 0
          fi

          # force_run=true이면 통과
          if [ "$FORCE" = "true" ]; then
            echo "✅ force_run=true — skipping time check."
            exit 0
          fi

          # workflow_dispatch: 13:00 UTC (= 22:00 KST, 잘못된 자동 트리거) 차단
          HOUR=$(date -u +%H)
          echo "Current UTC hour: $HOUR (event: $EVENT)"
          if [ "$HOUR" -ge 2 ] && [ "$HOUR" -lt 19 ]; then
            echo "⛔ Blocked: workflow_dispatch at UTC ${HOUR}:xx — not a scheduled send time."
            echo "To override, set force_run=true."
            exit 1
          fi
          echo "✅ Time check passed."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt langgraph langchain-core langchain-anthropic anthropic feedparser beautifulsoup4 lxml trafilatura deep-translator google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib google-genai pyyaml tenacity python-dateutil

      - name: Load active countries from Supabase settings
        run: |
          # Read settings from Supabase (is_active + countries)
          RESPONSE=$(curl -s \
            "${{ secrets.SUPABASE_URL }}/rest/v1/settings?order=id.desc&limit=1&select=countries,is_active" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            --max-time 10) || true

          IS_ACTIVE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if not d or d[0].get('is_active', True) else 'false')" 2>/dev/null || echo "true")

          # [Critical fix #3] Check is_active — skip if disabled
          EVENT="${{ github.event_name }}"
          FORCE="${{ github.event.inputs.force_run }}"
          if [ "$IS_ACTIVE" = "false" ] && [ "$FORCE" != "true" ]; then
            echo "⛔ is_active=false in settings — newsletter send is disabled. Set force_run=true to override."
            exit 1
          fi

          # If countries were passed manually via workflow_dispatch, use those
          MANUAL="${{ github.event.inputs.countries }}"
          if [ -n "$MANUAL" ]; then
            echo "ACTIVE_COUNTRIES=$MANUAL" >> $GITHUB_ENV
            echo "Using manual input countries: $MANUAL"
            exit 0
          fi

          # Otherwise use countries from Supabase settings
          COUNTRIES=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(','.join(d[0]['countries']) if d and d[0].get('countries') else '')" 2>/dev/null || echo "")

          if [ -n "$COUNTRIES" ]; then
            echo "ACTIVE_COUNTRIES=$COUNTRIES" >> $GITHUB_ENV
            echo "Loaded countries from Supabase settings: $COUNTRIES"
          else
            FALLBACK="KR,RU,VN,TH,PH,PK,GCC,CN,US,IN,JP,AE,SA,OM,EG,MY,KH,LA,CL,AU,IL,MN"
            echo "ACTIVE_COUNTRIES=$FALLBACK" >> $GITHUB_ENV
            echo "⚠️ Supabase settings unavailable — using fallback: $FALLBACK"
          fi

      - name: Insert Supabase run row
        run: |
          # Use run_id passed from backend if available (links to existing DB row)
          PASSED_RUN_ID="${{ github.event.inputs.run_id }}"
          if [ -n "$PASSED_RUN_ID" ]; then
            RUN_ID="$PASSED_RUN_ID"
            echo "Using run_id from backend: $RUN_ID"
          else
            RUN_ID=$(python3 -c "import uuid; print(str(uuid.uuid4()))")
            echo "Generated new run_id: $RUN_ID"
          fi
          DATE_STR=$(date +%Y%m%d)
          COUNTRIES=$(python3 -c "import json,os; print(json.dumps(os.environ['ACTIVE_COUNTRIES'].split(',')))")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "DATE_STR=$DATE_STR" >> $GITHUB_ENV
          # PATCH if run already exists (from backend), INSERT if new (from schedule)
          PATCH_RESP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/runs?id=eq.$RUN_ID" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"running\",\"current_phase\":\"collection\",\"countries\":$COUNTRIES,\"date_str\":\"$DATE_STR\"}")
          if [ "$PATCH_RESP" = "204" ]; then
            echo "Supabase run $RUN_ID updated (existing row)"
          else
            curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/runs" \
              -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"id\":\"$RUN_ID\",\"date_str\":\"$DATE_STR\",\"countries\":$COUNTRIES,\"status\":\"running\",\"current_phase\":\"collection\"}" || true
            echo "Supabase run $RUN_ID inserted (new row)"
          fi

      - name: Run newsletter pipeline
        run: |
          PYTHONPATH=. python -u -c "
          import asyncio, os, json, sys, time

          # Force unbuffered output
          sys.stdout.reconfigure(line_buffering=True)

          from backend.agent.graph import compile_graph, create_initial_state

          countries = os.environ.get('INPUT_COUNTRIES', 'KR').split(',')
          countries = [c.strip() for c in countries]
          print(f'=== Starting pipeline for {countries} ===', flush=True)

          async def main():
              graph = compile_graph()
              state = create_initial_state(countries=countries)
              config = {'configurable': {'thread_id': 'github-action'}}
              final = {}

              async for event in graph.astream(state, config=config):
                  for node_name, output in event.items():
                      phase = output.get('current_phase', '')
                      final.update(output)

                      # Detailed logging per phase
                      stats = ''
                      if 'raw_articles' in output:
                          stats = ' | '.join(f'{c}:{len(a)}' for c,a in output['raw_articles'].items())
                          stats = f' articles=[{stats}]'
                      if 'scored_articles' in output:
                          stats = ' | '.join(f'{c}:{len(a)}' for c,a in output['scored_articles'].items())
                          stats = f' scored=[{stats}]'
                      if 'newsletters' in output:
                          stats = ' | '.join(f'{c}:{len(h)}chars' for c,h in output['newsletters'].items())
                          stats = f' html=[{stats}]'

                      print(f'[{node_name}] Phase: {phase}{stats}', flush=True)

              # Save newsletters
              newsletters = final.get('newsletters', {})
              os.makedirs('output/newsletters', exist_ok=True)
              for country, html in newsletters.items():
                  with open(f'output/newsletters/newsletter_{country}.html', 'w') as f:
                      f.write(html)
                  print(f'Saved newsletter_{country}.html ({len(html)} chars)', flush=True)

              print(f'=== Pipeline completed! {len(newsletters)} newsletters ===', flush=True)

          asyncio.run(main())
          "
        env:
          INPUT_COUNTRIES: ${{ env.ACTIVE_COUNTRIES }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Update Supabase run to "completed"
        if: success()
        run: |
          curl -s -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/runs?id=eq.$RUN_ID" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "completed", "current_phase": "complete", "completed_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' || true
          echo "Supabase run $RUN_ID updated to completed"

      - name: Update Supabase run to "failed"
        if: failure()
        run: |
          curl -s -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/runs?id=eq.$RUN_ID" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "failed", "current_phase": "error", "completed_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' || true
          echo "Supabase run $RUN_ID updated to failed"

      - name: Upload newsletters
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-output-${{ github.run_number }}
          path: |
            output/newsletters/
          retention-days: 30
